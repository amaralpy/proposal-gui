<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body class="login-page light-theme">

    <main class="login-wrap">
      <section class="login-card">
        <div class="login-brand">
          <span class="material-symbols-outlined">shield_person</span>
        </div>
        <h1>Acceso al panel</h1>
        <p>Autenticación por LDAP con control local de roles.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="alert-wrap">
              {% for category, message in messages %}
                <div class="alert {{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="post" class="login-form" autocomplete="off">
          <label for="username">Usuario LDAP</label>
          <div class="input-with-icon">
            <span class="material-symbols-outlined">person</span>
            <input
              id="username"
              name="username"
              type="text"
              placeholder="usuario"
              value="{{ remembered_username or '' }}"
              required
            />
          </div>

          <label for="password">Contraseña</label>
          <div class="input-with-icon">
            <span class="material-symbols-outlined">lock</span>
            <input id="password" name="password" type="password" placeholder="••••••••" required />
          </div>

          <div class="remember-row">
            <input id="remember" name="remember" type="checkbox" {% if remember_me %}checked{% endif %} />
            <label for="remember">Recordarme</label>
          </div>

          <button class="primary-btn login-submit" type="submit">
            <span class="material-symbols-outlined">login</span>
            Ingresar
          </button>
        </form>
      </section>
    </main>

    <script>
      (function () {
        const savedTheme = localStorage.getItem("prospect-theme") || "light";
        const body = document.body;
        body.classList.toggle("dark-theme", savedTheme === "dark");
        body.classList.toggle("light-theme", savedTheme !== "dark");
      })();
    </script>
  </body>
</html>
